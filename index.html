<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Management System</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        /* ১ম পেজের প্রিমিয়াম বাটন/লিংক */
        .main-title {
            font-size: 30px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            display: inline-block;
            letter-spacing: -0.5px;
            transition: transform 0.3s ease;
        }

        .main-title:hover {
            transform: scale(1.05);
        }

        /* ২য় পেজের প্যানেল */
        .options-panel {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .options-panel h2 {
            font-size: 22px;
            margin-bottom: 25px;
            color: #0f172a;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-employee {
            background-color: #10b981;
        }
        .btn-employee:hover {
            background-color: #059669;
            transform: translateY(-2px);
        }

        .btn-client {
            background-color: var(--primary-color);
        }
        .btn-client:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <a id="factoryName" class="main-title" onclick="showOptions()">🏢 Factory Management System</a>

    <div id="optionsPanel" class="options-panel">
        <h2>Select Dashboard</h2>
        <div class="btn-group">
            <button class="btn btn-employee" onclick="alert('Employee Dashboard coming soon...')">👤 Employee Portal</button>
            <a href="Clients.html" class="btn btn-client">💼 Client Portal</a>
        </div>
    </div>
</div>

<script>
    function showOptions() {
        document.getElementById('factoryName').style.display = 'none';
        document.getElementById('optionsPanel').style.display = 'block';
    }
</script>

</body>
</html>
