<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Directory & Inventory Records</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 30px;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateX(-5px);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 15px;
        }

        .client-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .client-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
        }

        .client-card:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
            border-color: var(--primary-color);
        }

        .report-section {
            display: none;
            margin-top: 40px;
            border-top: 1px solid #e2e8f0;
            padding-top: 30px;
        }

        .report-title {
            font-size: 22px;
            margin-bottom: 20px;
            color: var(--text-dark);
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 15px;
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f8fafc;
        }
        
        .loading {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Back to Main Menu</a>

    <h1>💼 Client Directory</h1>
    <p class="subtitle">Select a client below to view their real-time supply chain and delivery records.</p>
    <p id="loadingText" class="loading">Fetching data from Google Sheets, please wait...</p>

    <div id="clientGrid" class="client-grid"></div>

    <div id="reportSection" class="report-section">
        <h2 id="clientNameHeader" class="report-title">Client Ledger</h2>
        
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Item Description</th>
                        <th>Quantity</th>
                        <th>Challan / Vehicle No.</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ⚠️ আপনার গুগল অ্যাপ স্ক্রিপ্ট থেকে কপি করা Web App URL টি নিচের লাইনে বসিয়ে দিন
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz-ZCO7YT_zpaUVuoUzEbDfoze1sqdoqJkVy7nd9dZ6PqJgJxsV_iVCNTdgdZI_imTC/exec';

    let globalInventoryData = [];

    async function loadSheetData() {
        try {
            const response = await fetch(WEB_APP_URL);
            const rows = await response.json();

            // প্রথম লাইনের হেডার বাদ দিয়ে বাকি ডেটা সেভ করা
            globalInventoryData = rows.slice(1);

            // ইউনিক ক্লায়েন্টদের নামের তালিকা তৈরি করা
            let clients = [];
            globalInventoryData.forEach(row => {
                if(row[0] && !clients.includes(row[0])) {
                    clients.push(row[0]);
                }
            });

            // ক্লায়েন্টদের জন্য বাটন তৈরি করা
            const grid = document.getElementById('clientGrid');
            grid.innerHTML = "";
            clients.forEach(client => {
                const card = document.createElement('div');
                card.className = 'client-card';
                card.innerText = client;
                card.onclick = () => showReport(client);
                grid.appendChild(card);
            });

            document.getElementById('loadingText').style.display = 'none';

        } catch (error) {
            console.error("Error loading sheet:", error);
            document.getElementById('loadingText').innerText = "Failed to load data. Please verify your Apps Script Deployment URL.";
        }
    }

    function showReport(clientName) {
        document.getElementById('clientNameHeader').innerText = "📝 Ledger: " + clientName;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ""; 

        globalInventoryData.forEach(row => {
            if(row[0] === clientName) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${row[1] || ''}</strong></td>
                    <td>${row[2] || ''}</td>
                    <td>${row[3] || ''}</td>
                    <td><code style="background:#f1f5f9; padding:4px 8px; border-radius:4px;">${row[4] || ''}</code></td>
                `;
                tbody.appendChild(tr);
            }
        });
        
        document.getElementById('reportSection').style.display = 'block';
    }

    window.onload = loadSheetData;
</script>

</body>
</html>
